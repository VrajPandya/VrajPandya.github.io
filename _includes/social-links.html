            <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M18.9 2h3.3l-7.2 8.25L23.5 22h-6.65l-5.2-6.8L5.7 22H2.4l7.7-8.8L2 2h6.82l4.7 6.22L18.9 2Zm-1.16 17.93h1.83L7.82 3.96H5.86l11.88 15.97Z"/>

{% endif %}
