<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.title != site.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | escape }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
    <link rel="icon" href="{{ '/assets/favicon.png' | relative_url }}" type="image/png">
  </head>
  <body class="layout-{{ page.layout }}{% if page.body_class %} {{ page.body_class }}{% endif %}">
    <a class="skip-link" href="#content">Skip to content</a>
    <div class="site-shell">
      {% include nav.html %}
      <main id="content" class="site-main">
        {{ content }}
      </main>
      <footer class="site-footer">
        <span>{{ site.title }}</span>
        {% include social-links.html %}
      </footer>
    </div>
  </body>
</html>
